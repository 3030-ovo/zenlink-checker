<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenLink タグ確認ツール</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f1f0ec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --info-bg:#e6f1fb;--info-text:#185fa5;--info-border:#b5d4f4;
  --ok-bg:#eaf3de;--ok-text:#3b6d11;
  --ng-bg:#fcebeb;--ng-text:#a32d2d;
  --warn-bg:#faeeda;--warn-text:#854f0b;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:15px}
.page{max-width:820px;margin:0 auto;padding:32px 20px 80px}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px}
.section-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.input-row{display:flex;gap:8px;margin-bottom:10px}
.input-row input{flex:1;height:36px;border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 12px;font-size:14px;background:var(--bg);color:var(--text);outline:none}
.input-row input:focus{border-color:var(--info-text)}
button{height:36px;border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 16px;font-size:13px;background:var(--bg);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
button:hover{background:var(--bg2)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--info-bg);color:var(--info-text);border-color:var(--info-border);font-weight:500;width:100%;justify-content:center;height:40px;font-size:14px;margin-top:4px}
.btn-primary:hover{opacity:.85;background:var(--info-bg)}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset-btn{font-size:12px;height:28px;padding:0 10px;color:var(--text2)}
.url-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;min-height:0}
.url-tag{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px}
.url-tag span.u{flex:1;word-break:break-all;color:var(--text)}
.url-tag .del{color:var(--text3);cursor:pointer;font-size:15px;flex-shrink:0;line-height:1}
.url-tag .del:hover{color:var(--ng-text)}

/* API key area */
.apikey-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}
.apikey-row input{flex:1;height:34px;border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 12px;font-size:13px;background:var(--bg);color:var(--text);font-family:monospace;outline:none}
.apikey-row input:focus{border-color:var(--info-text)}
.hint{font-size:11px;color:var(--text3);line-height:1.5}
.hint a{color:var(--info-text)}

/* summary */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.summary-card{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.snum{font-size:26px;font-weight:500;line-height:1.1}
.slbl{font-size:11px;color:var(--text2);margin-top:3px}
.num-ok{color:#3b6d11}.num-warn{color:#854f0b}.num-ng{color:#a32d2d}

/* result cards */
.result-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px}
.result-header{display:flex;align-items:flex-start;gap:10px;padding:14px 16px 12px}
.badge{flex-shrink:0;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-top:1px}
.badge-ok{background:var(--ok-bg);color:var(--ok-text)}
.badge-ng{background:var(--ng-bg);color:var(--ng-text)}
.badge-warn{background:var(--warn-bg);color:var(--warn-text)}
.badge-loading{background:var(--bg2);color:var(--text2)}
.result-url{font-size:13px;font-weight:500;flex:1;word-break:break-all}
.result-url a{color:var(--info-text);text-decoration:none}
.result-url a:hover{text-decoration:underline}
.result-body{border-top:0.5px solid var(--border);padding:12px 16px}
.issue-list{list-style:none;padding:0;font-size:12px;color:var(--text2);line-height:1.8}
.issue-list li{display:flex;gap:6px}
.issue-list li::before{content:"→";color:var(--text3);flex-shrink:0}
.platform-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:3px 10px;margin-top:8px}
.platform-tag a{color:var(--info-text);text-decoration:none}
.platform-tag a:hover{text-decoration:underline}

/* screenshot preview */
.ss-section{margin-top:12px}
.ss-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.ss-wrap{position:relative;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.ss-wrap img{width:100%;display:block;border-radius:var(--radius)}
.ss-wrap.loading{min-height:120px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3)}
.ss-overlay{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px}
.ss-note{font-size:11px;color:var(--text3);margin-top:5px}
.ss-note a{color:var(--info-text)}
.no-api-note{background:var(--warn-bg);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--warn-text);margin-top:8px}
.no-api-note a{color:#185fa5}

/* tabs in result */
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:10px}
.tab{font-size:12px;padding:6px 12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;border-radius:0;height:auto}
.tab.active{color:var(--info-text);border-bottom-color:var(--info-text);font-weight:500}
.tab-pane{display:none}.tab-pane.active{display:block}

/* popup simulation */
.popup-sim{background:var(--bg2);border-radius:var(--radius);padding:12px;font-size:12px}
.mock-popup-wrap{background:rgba(0,0,0,.35);border-radius:var(--radius);padding:24px 16px;margin-top:8px;display:flex;align-items:center;justify-content:center}
.mock-popup{background:#fff;border-radius:10px;padding:16px 20px;max-width:280px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.mock-popup .mp-icon{font-size:28px;margin-bottom:6px;color:#185fa5}
.mock-popup .mp-title{font-size:13px;font-weight:600;color:#111;margin-bottom:4px}
.mock-popup .mp-body{font-size:11px;color:#555;line-height:1.5;margin-bottom:10px}
.mock-popup .mp-btn{background:#185fa5;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;width:100%}

@media(max-width:600px){
  .page{padding:20px 14px 60px}
  .summary-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div class="page">
  <h1><i class="fa-solid fa-tag"></i> ZenLink タグ確認ツール</h1>
  <p class="sub">対象サイトへのZenLinkスクリプト挿入状況をAI解析 + スクリーンショットで一括チェック</p>

  <!-- API Key -->
  <div class="card">
    <div class="section-label">ScreenshotAPI キー（海外IPプレビュー用・任意）</div>
    <div class="apikey-row">
      <input type="password" id="ssApiKey" placeholder="your_screenshotapi_token" />
      <button onclick="saveKey()"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
    </div>
    <p class="hint">
      未入力でもタグ確認は可能。スクリーンショットプレビューを使う場合は
      <a href="https://screenshotapi.net" target="_blank">screenshotapi.net</a> で無料取得（月200枚無料）。
      キーはブラウザのローカルストレージに保存されます。
    </p>
  </div>

  <!-- URL input -->
  <div class="card">
    <div class="section-label">チェック対象 URL</div>
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="https://example.com" />
      <button onclick="addUrl()"><i class="fa-solid fa-plus"></i> 追加</button>
    </div>
    <div class="section-label">プリセット</div>
    <div class="preset-row">
      <button class="preset-btn" onclick="loadPreset('ok')"><i class="fa-solid fa-check"></i> 導入済みサンプル</button>
      <button class="preset-btn" onclick="loadPreset('ng')"><i class="fa-solid fa-xmark"></i> 未導入サンプル</button>
      <button class="preset-btn" onclick="loadPreset('all')">全サンプル</button>
      <button class="preset-btn" onclick="clearAll()"><i class="fa-solid fa-trash"></i> クリア</button>
    </div>
    <div class="url-list" id="urlList"></div>
    <button class="btn-primary" id="checkBtn" onclick="runCheck()" disabled>
      <i class="fa-solid fa-magnifying-glass"></i> タグ挿入状況を一括チェック
    </button>
  </div>

  <!-- summary -->
  <div id="summaryArea" style="display:none">
    <div class="summary-grid" id="summaryRow"></div>
  </div>

  <!-- results -->
  <div id="results"></div>
</div>

<script>
const TARGET_SCRIPT = 'https://zen.one/analytics.js';
const PLATFORMS = {
  shopify:    {name:'Shopify',      guide:'https://support.zen.one/zenlink-guide/tag/shopify'},
  base:       {name:'BASE',         guide:'https://support.zen.one/zenlink-guide/tag/base'},
  ecforce:    {name:'ecforce',      guide:'https://support.zen.one/zenlink-guide/tag/ecforce'},
  ochanoko:   {name:'おちゃのこネット', guide:'https://support.zen.one/zenlink-guide/tag/ochanoko'},
  makeshop:   {name:'Makeshop',     guide:'https://support.zen.one/zenlink-guide/tag/makeshop'},
  futureshop: {name:'futureshop',   guide:'https://support.zen.one/zenlink-guide/tag/futureshop'},
  colorme:    {name:'ColorMe',      guide:'https://support.zen.one/zenlink-guide/tag/colorme'},
  square:     {name:'Square',       guide:'https://support.zen.one/zenlink-guide/tag/square'},
  wix:        {name:'WIX',          guide:'https://support.zen.one/zenlink-guide/tag/wix'},
  eccube:     {name:'EC-CUBE',      guide:'https://support.zen.one/zenlink-guide/tag/ec-cube'},
  estore:     {name:'Eストアー',    guide:'https://support.zen.one/zenlink-guide/tag/estore'},
  wordpress:  {name:'WordPress',    guide:'https://support.zen.one/zenlink-guide/tag/wordpress'},
  aiship:     {name:'aiship',       guide:'https://support.zen.one/zenlink-guide/tag/aiship'},
};
const PRESETS = {
  ok:  ['https://www.mskw.jp','https://estrellas1025.shop-pro.jp','https://dreamvs.jp'],
  ng:  ['https://www.kukkia.jp','https://riverleaf.jp','https://www.stickerfun.jp'],
  all: ['https://www.mskw.jp','https://estrellas1025.shop-pro.jp','https://dreamvs.jp',
        'https://www.kukkia.jp','https://riverleaf.jp','https://www.stickerfun.jp'],
};

let urls = [];
let ssApiKey = localStorage.getItem('ss_api_key') || '';
if(ssApiKey) document.getElementById('ssApiKey').value = ssApiKey;

function saveKey() {
  const v = document.getElementById('ssApiKey').value.trim();
  ssApiKey = v;
  localStorage.setItem('ss_api_key', v);
  alert(v ? 'APIキーを保存しました' : 'APIキーをクリアしました');
}

function detectPlatform(html) {
  const h = (html||'').toLowerCase();
  if(h.includes('cdn.shopify.com')||h.includes('myshopify.com')) return 'shopify';
  if(h.includes('shop-pro.jp')) return 'colorme';
  if(h.includes('base.shop')||h.includes('base-cdn.jp')) return 'base';
  if(h.includes('ecforce')) return 'ecforce';
  if(h.includes('ochanoko')) return 'ochanoko';
  if(h.includes('makeshop')) return 'makeshop';
  if(h.includes('futureshop')) return 'futureshop';
  if(h.includes('squarespace.com')) return 'square';
  if(h.includes('wix.com')||h.includes('wixsite.com')) return 'wix';
  if(h.includes('eccube')||h.includes('ec-cube')) return 'eccube';
  if(h.includes('aiship')) return 'aiship';
  if(h.includes('wp-content')||h.includes('wordpress')) return 'wordpress';
  return null;
}

function analyzeTag(html) {
  const issues = [];
  let status = 'ok';
  const anyZen = (html||'').toLowerCase().includes('zen.one/analytics');
  if(!anyZen) {
    issues.push('スクリプトタグが見つかりません（未挿入）');
    return {status:'ng', issues};
  }
  const scripts = [...(html||'').matchAll(/<script[^>]*>/gi)].map(m=>m[0]);
  const targets = scripts.filter(s=>s.includes('analytics.js'));
  if(targets.length===0) {
    issues.push('zen.one/analytics.jsへの参照はありますが、scriptタグの形式が不正です');
    status='warn';
  }
  targets.forEach(tag=>{
    if(!tag.includes('async')) {
      issues.push('async属性がありません（表示速度に影響する可能性があります）');
      if(status==='ok') status='warn';
    }
    const m = tag.match(/src\s*=\s*["']([^"']+)["']/i);
    if(m && m[1]!==TARGET_SCRIPT) {
      issues.push(`src URLが変更されています: ${m[1]}`);
      if(status==='ok') status='warn';
    }
  });
  const headMatch = (html||'').match(/<head[\s\S]*?<\/head>/i);
  if(headMatch){
    const h = headMatch[0];
    if(!h.includes('analytics.js')){
      issues.push('スクリプトが <head> 内ではなく body 等に挿入されています');
      if(status==='ok') status='warn';
    } else {
      const headEnd = h.lastIndexOf('</head>');
      const sPos = h.lastIndexOf('analytics.js');
      if(headEnd-sPos > 2000){
        issues.push('スクリプトが <head> の上部に挿入されています（推奨: </head> 直前）');
        if(status==='ok') status='warn';
      }
    }
  }
  if(status==='ok') issues.push('正常: 推奨位置にスクリプトタグが確認できました');
  return {status, issues};
}

function getScreenshotUrl(url) {
  if(!ssApiKey) return null;
  return `https://shot.screenshotapi.net/screenshot?token=${encodeURIComponent(ssApiKey)}&url=${encodeURIComponent(url)}&output=image&width=1280&height=800&delay=2000&full_page=false`;
}

async function fetchAndAnalyze(url) {
  const prompt = `Fetch the URL: ${url}
Return ONLY a valid JSON object (no markdown, no backticks) with:
- "head_html": the full <head>...</head> section as string (max 5000 chars)
- "full_html_preview": first 3000 chars of raw HTML
- "script_tags": array of all <script> tags containing analytics.js
- "platform_hints": array of first 5 CDN/generator hints found`;

  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:prompt}]
    })
  });
  const data = await resp.json();
  const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function cardId(url){ return 'card_'+btoa(url).replace(/[^a-z0-9]/gi,'').slice(0,12); }
function tabId(url,i){ return 'tab_'+btoa(url).replace(/[^a-z0-9]/gi,'').slice(0,12)+'_'+i; }

function switchTab(url, idx){
  const cid = cardId(url);
  const card = document.getElementById(cid);
  card.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  card.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

function renderCard(url, data, analysis, platform){
  const cid = cardId(url);
  const platInfo = platform ? PLATFORMS[platform] : null;
  const ssUrl = getScreenshotUrl(url);
  const badgeClass = analysis.status==='ok'?'badge-ok':analysis.status==='ng'?'badge-ng':'badge-warn';
  const badgeLabel = analysis.status==='ok'?'✓ OK — 正常':analysis.status==='ng'?'✗ NG — 未挿入':'⚠ WARN — 要確認';

  const issuesHtml = analysis.issues.map(i=>`<li>${i}</li>`).join('');
  const platHtml = platInfo ? `<div class="platform-tag"><i class="fa-solid fa-laptop"></i>${platInfo.name}&nbsp;·&nbsp;<a href="${platInfo.guide}" target="_blank">タグ設置ガイド <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px"></i></a></div>` : '';

  const ssTab = ssUrl ? `
    <button class="tab" onclick="switchTab('${url}',1)"><i class="fa-solid fa-camera"></i> 海外IPプレビュー</button>` : '';

  const popupTab = analysis.status==='ok' ? `
    <button class="tab" onclick="switchTab('${url}',2)"><i class="fa-solid fa-globe"></i> ポップアップ動作</button>` : '';

  const ssPane = ssUrl ? `
    <div class="tab-pane" id="${tabId(url,1)}">
      <div class="ss-label"><i class="fa-solid fa-globe"></i> 海外IP（米国サーバー）からのスクリーンショット</div>
      <div class="ss-wrap loading" id="ss_${cid}">読み込み中...</div>
      <p class="ss-note">ScreenshotAPI.net の米国サーバー経由でレンダリングされた実際の表示です。ZenLinkが正常に動作している場合、海外ユーザー向けポップアップが表示されます。</p>
    </div>` : '';

  const popupPane = analysis.status==='ok' ? `
    <div class="tab-pane" id="${tabId(url,2)}">
      <div class="popup-sim">
        <p style="font-size:12px;color:var(--text2);margin-bottom:8px">海外IPアクセス時のZenLinkポップアップ表示イメージ（モック）</p>
        <div class="mock-popup-wrap">
          <div class="mock-popup">
            <div class="mp-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="mp-title">海外からもご購入いただけます</div>
            <div class="mp-body">ZenLinkを通じて、このショップの商品を海外へお届けします。</div>
            <button class="mp-btn">購入ページへ進む</button>
          </div>
        </div>
        <p class="ss-note" style="margin-top:8px">※実際の表示は設定により異なります。実表示確認は <a href="https://www.browserling.com" target="_blank">Browserling</a> などをご利用ください。</p>
      </div>
    </div>` : '';

  const html = `
    <div class="result-card" id="${cid}">
      <div class="result-header">
        <span class="badge ${badgeClass}">${badgeLabel}</span>
        <div class="result-url"><a href="${url}" target="_blank">${url}</a></div>
      </div>
      <div class="result-body">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('${url}',0)"><i class="fa-solid fa-list-check"></i> 診断結果</button>
          ${ssTab}
          ${popupTab}
        </div>
        <div class="tab-pane active" id="${tabId(url,0)}">
          <ul class="issue-list">${issuesHtml}</ul>
          ${platHtml}
          ${!ssUrl && analysis.status==='ok' ? `<div class="no-api-note">海外IPプレビューを有効にするには <a href="https://screenshotapi.net" target="_blank">ScreenshotAPI</a> の無料キーを上部フォームに入力してください（月200枚無料）。</div>` : ''}
        </div>
        ${ssPane}
        ${popupPane}
      </div>
    </div>`;

  document.getElementById('results').insertAdjacentHTML('beforeend', html);

  // load screenshot lazily
  if(ssUrl){
    const wrap = document.getElementById('ss_'+cid);
    const img = new Image();
    img.onload = ()=>{
      wrap.classList.remove('loading');
      wrap.innerHTML='';
      wrap.appendChild(img);
      const overlay = document.createElement('div');
      overlay.className='ss-overlay';
      overlay.textContent='米国サーバー経由';
      wrap.appendChild(overlay);
    };
    img.onerror = ()=>{
      wrap.classList.remove('loading');
      wrap.innerHTML='<span style="font-size:12px;color:var(--warn-text)">スクリーンショットの取得に失敗しました。APIキーまたはURLを確認してください。</span>';
    };
    img.src = ssUrl;
    img.style.cssText='width:100%;display:block;border-radius:8px';
  }
}

async function runCheck() {
  if(!urls.length) return;
  const btn = document.getElementById('checkBtn');
  btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> 確認中...';
  document.getElementById('results').innerHTML='';
  document.getElementById('summaryArea').style.display='none';

  // placeholder cards
  urls.forEach(url=>{
    const cid=cardId(url);
    document.getElementById('results').insertAdjacentHTML('beforeend',`
      <div class="result-card" id="${cid}">
        <div class="result-header">
          <span class="badge badge-loading"><i class="fa-solid fa-spinner fa-spin"></i> 解析中</span>
          <div class="result-url"><a href="${url}" target="_blank">${url}</a></div>
        </div>
      </div>`);
  });

  let ok=0,ng=0,warn=0;

  await Promise.all(urls.map(async url=>{
    const cid=cardId(url);
    try{
      const result = await fetchAndAnalyze(url);
      const combined = (result.head_html||'')+(result.full_html_preview||'')+(result.script_tags||[]).join(' ');
      const analysis = analyzeTag(combined);
      const platform = detectPlatform((result.platform_hints||[]).join(' ')+combined);
      if(analysis.status==='ok') ok++;
      else if(analysis.status==='ng') ng++;
      else warn++;
      document.getElementById(cid).remove();
      renderCard(url, result, analysis, platform);
    }catch(e){
      ng++;
      const el=document.getElementById(cid);
      if(el) el.innerHTML=`<div class="result-header">
        <span class="badge badge-ng">エラー</span>
        <div class="result-url"><a href="${url}" target="_blank">${url}</a></div>
      </div>
      <div class="result-body"><ul class="issue-list"><li>ページ取得に失敗しました。URLを確認するか手動でソースを確認してください。</li></ul></div>`;
    }
  }));

  document.getElementById('summaryArea').style.display='block';
  document.getElementById('summaryRow').innerHTML=`
    <div class="summary-card"><div class="snum num-ok">${ok}</div><div class="slbl">正常 (OK)</div></div>
    <div class="summary-card"><div class="snum num-warn">${warn}</div><div class="slbl">要確認 (WARN)</div></div>
    <div class="summary-card"><div class="snum num-ng">${ng}</div><div class="slbl">未挿入/異常 (NG)</div></div>`;

  btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-rotate-right"></i> 再チェック';
}

function addUrl(){
  const input=document.getElementById('urlInput');
  let v=input.value.trim();
  if(!v) return;
  if(!/^https?:\/\//i.test(v)) v='https://'+v;
  if(!urls.includes(v)){ urls.push(v); renderList(); }
  input.value=''; input.focus();
}
function removeUrl(url){ urls=urls.filter(u=>u!==url); renderList(); }
function loadPreset(key){ PRESETS[key].forEach(u=>{if(!urls.includes(u)) urls.push(u);}); renderList(); }
function clearAll(){ urls=[]; renderList(); document.getElementById('results').innerHTML=''; document.getElementById('summaryArea').style.display='none'; }
function renderList(){
  document.getElementById('urlList').innerHTML=urls.map(u=>
    `<div class="url-tag"><span class="u">${u}</span><span class="del" onclick="removeUrl('${u.replace(/'/g,"\\'")}')">×</span></div>`
  ).join('');
  document.getElementById('checkBtn').disabled=urls.length===0;
}
document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter') addUrl();});
</script>
</body>
</html>
